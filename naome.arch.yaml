# NAOME architecture fitness configuration.
layers:
  frontend:
    paths:
      - "frontend/app/**"
      - "frontend/components/**"
      - "frontend/domain/**"
      - "frontend/public/**"
      - "frontend/vercel.json"
      - "frontend/package.json"
      - "frontend/next.config.ts"
      - "frontend/tsconfig.json"
      - "frontend/postcss.config.mjs"
      - "frontend/eslint.config.mjs"

contexts:
  website:
    paths:
      - "frontend/app/**"
      - "frontend/components/**"
      - "frontend/domain/**"
      - "frontend/public/**"
      - "frontend/package.json"
      - "frontend/next.config.ts"
      - "frontend/tsconfig.json"
      - "frontend/postcss.config.mjs"
      - "frontend/eslint.config.mjs"
      - "frontend/vercel.json"
    public_api:
      - "frontend/app/page.tsx"
      - "frontend/app/layout.tsx"
      - "frontend/components/index.ts"
      - "frontend/domain/site/content.ts"
      - "frontend/domain/site/seo.ts"
      - "frontend/domain/site/assets.ts"
      - "frontend/package.json"
      - "frontend/README.md"

rules:
  max_file_lines:
    enabled: true
    value: 1000
    severity: warning
  generated_manual_boundary:
    enabled: true
    severity: warning
  no_forbidden_layer_dependencies:
    enabled: true
    severity: error
  no_cross_context_internal_imports:
    enabled: true
    severity: warning
  public_api_boundary:
    enabled: true
    severity: warning
  no_cycles:
    enabled: true
    severity: error
  no_transitive_forbidden_layer_dependencies:
    enabled: true
    severity: error
  max_imports_per_file:
    enabled: true
    value: 30
    severity: warning
  max_fan_out:
    enabled: true
    value: 30
    severity: warning
  external_dependency_policy:
    enabled: false

ignore:
  - path: ".next/**"
    reason: "Generated Next.js build artifacts, not architecture-owned."
  - path: "frontend/.next/**"
    reason: "Generated Next.js build artifacts, includes generated route/type files."
  - path: "frontend/.next/types/**"
    reason: "Next.js route type generation output; transient by design."
  - path: "frontend/next-env.d.ts"
    reason: "Next.js generated type shim importing build-time generated type declarations."
  - path: "frontend/node_modules/**"
    reason: "Dependency cache artifacts."
  - path: "frontend/build/**"
    reason: "Build artifact directory."
  - path: "frontend/package-lock.json"
    reason: "Generated npm dependency lockfile."
  - path: ".naome/architecture-graph.json"
    reason: "NAOME-generated architecture graph snapshot."
